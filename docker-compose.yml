# Claude Power Pack - MCP Server Orchestration
# Usage (prefer Makefile targets - see Deployment Conventions in CLAUDE.md):
#   make docker-up PROFILE=core                      # Second Opinion + Nano-Banana
#   make docker-up PROFILE="core browser"            # + Playwright
#   make docker-up PROFILE="core cicd"               # + Woodpecker CI
#   make docker-build PROFILE=core                   # Build images only
#   make docker-refresh PROFILE="core browser cicd"  # Rebuild, restart, wait healthy
#   make docker-down                                 # Stop all services
#   make docker-ps                                   # Show container status
#
# Secrets: Only AWS credentials needed in .env (never commit this):
#   AWS_ACCESS_KEY_ID=...
#   AWS_SECRET_ACCESS_KEY=...
#   AWS_TOKEN=...               (SSRF token for secrets agent)
#
# CI/deploy can provide these as environment variables instead of a root .env.
#
# The aws-secrets-agent sidecar fetches LLM keys and other secrets
# from AWS Secrets Manager at runtime. No application secrets on disk.
#
# Image tags: deployable images are tagged with CPP_IMAGE_TAG (set by the
# Makefile to the short git SHA) so every build is traceable to a commit and
# rollbacks have provenance. Never use :latest here. It defaults to "dev" for
# ad-hoc local/CI builds where no commit tag is exported.

services:
  aws-secrets-agent:
    build:
      context: ./aws-secrets-agent
    image: aws-secrets-agent:${CPP_IMAGE_TAG:-dev}
    # Stable name by default (workstation deploys + cpp:update model detection);
    # CI smoke sets CPP_CONTAINER_PREFIX to keep parallel projects isolated.
    container_name: ${CPP_CONTAINER_PREFIX:-}aws-secrets-agent
    ports:
      - "${AWS_SECRETS_AGENT_PORT_MAPPING:-2773:2773}"
    env_file:
      - path: .env
        required: false
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
    healthcheck:
      # /ping is a local liveness probe in the AWS agent: it verifies the
      # daemon is listening and does not call AWS or fetch cached secrets.
      # The longer grace period and modestly larger budget avoid false
      # unhealthy states during cold starts while CI builds images in parallel.
      test: ["CMD", "curl", "-sf", "-H", "X-Aws-Parameters-Secrets-Token: ${AWS_TOKEN:-default-token}", "http://localhost:2773/ping"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    profiles: ["core", "cicd"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 64M

  mcp-second-opinion:
    build:
      context: ./mcp-second-opinion
      dockerfile: deploy/Dockerfile
    image: mcp-second-opinion:${CPP_IMAGE_TAG:-dev}
    container_name: ${CPP_CONTAINER_PREFIX:-}mcp-second-opinion
    ports:
      - "${MCP_SECOND_OPINION_PORT_MAPPING:-8080:8080}"
    env_file:
      - path: .env
        required: false
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - AWS_SECRET_NAME=${SECOND_OPINION_AWS_SECRET_NAME-codex_llm_apikeys}
      - SECRETS_AGENT_URL=http://aws-secrets-agent:2773
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
      # LLM key injection point for CI/deploy with no live secrets-agent (e.g.
      # the CI runtime-smoke). Unset on the host = not passed through. On a real
      # workstation deploy fetch-secrets.sh exports the agent's values and execs
      # the server, so the agent always wins over anything injected here. The
      # /readyz gate needs at least one of these to be present.
      - GEMINI_API_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - MISTRAL_API_KEY
      - GROQ_API_KEY
      - OPENROUTER_API_KEY
      - DEEPSEEK_API_KEY
    entrypoint: ["/app/fetch-secrets.sh"]
    command: ["python", "server.py"]
    depends_on:
      aws-secrets-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  mcp-nano-banana:
    build:
      context: ./mcp-nano-banana
      dockerfile: deploy/Dockerfile
    image: mcp-nano-banana:${CPP_IMAGE_TAG:-dev}
    container_name: ${CPP_CONTAINER_PREFIX:-}mcp-nano-banana
    ports:
      - "${MCP_NANO_BANANA_PORT_MAPPING:-8084:8084}"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/readyz')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["core"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  # mcp-evaluate: DEPRECATED - evaluation logic absorbed into /evaluate:issue command + evaluate skill.
  # Dockerfile kept in mcp-evaluate/deploy/ for reference. To re-enable, uncomment below.
  # mcp-evaluate:
  #   build:
  #     context: ./mcp-evaluate
  #     dockerfile: deploy/Dockerfile
  #   image: mcp-evaluate:${CPP_IMAGE_TAG:-dev}
  #   ports:
  #     - "8083:8083"
  #   env_file:
  #     - path: .env
  #       required: false
  #   depends_on:
  #     mcp-second-opinion:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   profiles: ["eval"]
  #   environment:
  #     - SECOND_OPINION_URL=http://mcp-second-opinion:8080
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: "0.5"
  #         memory: 256M
  #       reservations:
  #         cpus: "0.25"
  #         memory: 128M

  mcp-woodpecker-ci:
    build:
      context: ./mcp-woodpecker-ci
      dockerfile: deploy/Dockerfile
    image: mcp-woodpecker-ci:${CPP_IMAGE_TAG:-dev}
    container_name: ${CPP_CONTAINER_PREFIX:-}mcp-woodpecker-ci
    ports:
      - "${MCP_WOODPECKER_CI_PORT_MAPPING:-8085:8085}"
    env_file:
      - path: .env
        required: false
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - AWS_SECRET_NAME=${WOODPECKER_CI_AWS_SECRET_NAME-essent-ai}
      - SECRETS_AGENT_URL=http://aws-secrets-agent:2773
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
      # Woodpecker credential injection point for CI/deploy with no live
      # secrets-agent. Unset on the host = not passed through; the agent's values
      # win at runtime via fetch-secrets.sh. /readyz needs both to report ready.
      - WOODPECKER_URL
      - WOODPECKER_API_TOKEN
    entrypoint: ["/app/fetch-secrets.sh"]
    command: ["python", "server.py"]
    depends_on:
      aws-secrets-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/readyz')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles: ["cicd"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  mcp-playwright-persistent:
    build:
      context: ./mcp-playwright-persistent
      dockerfile: deploy/Dockerfile
    image: mcp-playwright-persistent:${CPP_IMAGE_TAG:-dev}
    container_name: ${CPP_CONTAINER_PREFIX:-}mcp-playwright-persistent
    ports:
      - "${MCP_PLAYWRIGHT_PORT_MAPPING:-8081:8081}"
    shm_size: "2gb"
    environment:
      - SERVER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles: ["browser"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
