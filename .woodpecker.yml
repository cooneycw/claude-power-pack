# Claude Power Pack - Woodpecker CI Pipeline
# Runs quality gates and Dockerfile lint.
#
# Pipeline:
#   PR/push -> secret-scan -> validate (lint+test+typecheck) + codex-skills-check
#              + eli5-vendor-check + eli5-upstream-drift (advisory)
#              + tool-risk-drift -> Dockerfile lint
#
# The Docker MCP runtime (second-opinion + aws-secrets-agent images, compose
# policy checks, image CVE/SBOM scans, and the runtime smoke stage) was retired
# in issue #469 when mcp-second-opinion moved to its own external repo. CPP no
# longer builds or ships container images.

when:
  - event: [push, pull_request]

steps:
  secret-scan:
    image: zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --verbose

  validate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    depends_on: [secret-scan]
    commands:
      - uv sync --extra dev --frozen
      - uv run ruff check .
      - uv run pytest
      - uv run mypy .

  # Explicit Codex-skill drift gate (issue #556): the pytest suite already checks
  # currency via test_codex_skill_sync.py, but a dedicated step makes an out-of-sync
  # codex/skills/ fail CI loudly on its own line. The generator is stdlib-only and
  # git-free, so it runs directly under the slim image (no `make`, matching the
  # uv-direct style of the steps above). Same command `make codex-skills-check` wraps.
  codex-skills-check:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    depends_on: [secret-scan]
    commands:
      - python3 scripts/codex-skill-sync.py --check

  # Vendored eli5-gate core gates (issue #591). The canonical home of the
  # /flow:eli5 necessity gate is cooneycw/eli5-gate; CPP vendors its core
  # between the eli5-core markers. The drift script for that link existed and
  # worked but was invoked by NOTHING - no step, no target, no test - so a stale
  # core was invisible. Two steps, because they catch different failures:
  #
  #   eli5-vendor-check   HARD gate, offline. Verifies the checked-in core still
  #                       matches the hash pinned in .claude/eli5-vendor.json,
  #                       i.e. nobody edited the vendored copy instead of the
  #                       canonical repo. Stdlib-only and network-free, so it
  #                       runs directly under the slim image (no curl, no git -
  #                       the #451/#489 trap).
  #   eli5-upstream-drift ADVISORY, network. The manifest pins what WAS vendored
  #                       and therefore cannot notice that upstream MOVED; only
  #                       a live fetch can. `failure: ignore` plus the script's
  #                       own fail-open behavior means neither drift nor an
  #                       offline runner can redden the pipeline - it reports.
  eli5-vendor-check:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    depends_on: [secret-scan]
    commands:
      - python3 scripts/eli5-vendor.py

  eli5-upstream-drift:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    depends_on: [secret-scan]
    failure: ignore
    commands:
      - python3 scripts/eli5-vendor.py --upstream

  # Shared permission-risk taxonomy gate (issue #576). CPP classifies command
  # risk in TWO places that must agree on what is dangerous: the canonical
  # scripts/classify-tool-risk.py (used by /security:permissions) and the
  # inline copy vendored into scripts/hook-permission-census.sh (kept
  # self-contained so the census hook stays fail-open). If DESTRUCTIVE_TOKENS
  # or CODE_EXEC drift apart, a command one classifier calls dangerous can be
  # proposed as an allow rule by the other - the taxonomy is safety-critical,
  # so this is a HARD gate (--strict, exit 1), not an advisory.
  #
  # The guard shipped with #495 documenting --strict "(for CI)" and was then
  # wired into nothing at all - no step, no target, no test - the same
  # dormant-capability shape #591 fixed for the eli5 vendor link. Stdlib-only
  # and git-free, so it runs directly under the slim image (the #451/#489 trap).
  tool-risk-drift:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    depends_on: [secret-scan]
    commands:
      - python3 scripts/tool-risk-drift.py --strict

  dockerfile-lint:
    image: ghcr.io/hadolint/hadolint:v2.14.0-debian
    pull: true
    depends_on: [validate]
    commands:
      - find . -path ./.git -prune -o -name Dockerfile -print0 | xargs -0 -r hadolint --failure-threshold error
