# Claude Power Pack - Woodpecker CI Pipeline
# Runs quality gates, dry-run Docker builds, and ephemeral MCP runtime smoke tests.
#
# Pipeline:
#   PR/push -> secret-scan -> validate (lint+test+typecheck) -> conditional Docker builds
#   MCP/compose/shared changes -> runtime-smoke (isolated compose up, health checks, teardown)

when:
  - event: [push, pull_request]

steps:
  secret-scan:
    image: zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --verbose

  validate:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim@sha256:4f5d923c9dcea037f57bda425dd209f3ec643da2f0b74227f68d09dab0b3bb36
    depends_on: [secret-scan]
    commands:
      - uv sync --extra dev --frozen
      - uv run ruff check .
      - uv run pytest
      - uv run mypy .

  dockerfile-lint:
    image: ghcr.io/hadolint/hadolint:v2.14.0-debian
    pull: true
    depends_on: [validate]
    commands:
      - find . -path ./.git -prune -o -name Dockerfile -print0 | xargs -0 hadolint --failure-threshold error

  compose-policy:
    image: docker:29.5.2-cli
    depends_on: [validate]
    commands:
      - |
        set -eu

        export AWS_TOKEN=ci-policy-token
        export AWS_SECRETS_AGENT_PORT_MAPPING=2773
        export MCP_SECOND_OPINION_PORT_MAPPING=8080
        export MCP_PLAYWRIGHT_PORT_MAPPING=8081
        export MCP_NANO_BANANA_PORT_MAPPING=8084
        export MCP_WOODPECKER_CI_PORT_MAPPING=8085

        rendered="$(mktemp)"
        docker compose --profile core --profile browser --profile cicd config --quiet
        docker compose --profile core --profile browser --profile cicd config > "$rendered"

        if grep -nE 'image: [^[:space:]]+:latest([[:space:]]|$)' "$rendered"; then
          echo "ERROR: rendered compose config must not use :latest images"
          exit 1
        fi

        if grep -n 'default-token' "$rendered"; then
          echo "ERROR: rendered compose config must not contain the default sidecar token"
          exit 1
        fi

        if grep -nE 'published: "?2773"?' "$rendered"; then
          echo "ERROR: aws-secrets-agent must not publish host port 2773 in CI config"
          exit 1
        fi

  build-aws-secrets-agent:
    image: woodpeckerci/plugin-docker-buildx
    depends_on: [validate]
    settings:
      repo: aws-secrets-agent
      dockerfile: aws-secrets-agent/Dockerfile
      context: aws-secrets-agent
      tags: ci-${CI_COMMIT_SHA}
      dry_run: true
      pull_image: false
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "aws-secrets-agent/**"

  build-second-opinion:
    image: woodpeckerci/plugin-docker-buildx
    depends_on: [validate]
    settings:
      repo: mcp-second-opinion
      dockerfile: mcp-second-opinion/deploy/Dockerfile
      context: mcp-second-opinion
      tags: ci-${CI_COMMIT_SHA}
      dry_run: true
      pull_image: false
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "aws-secrets-agent/**"
          - "lib/**"
          - "mcp-second-opinion/**"

  build-playwright:
    image: woodpeckerci/plugin-docker-buildx
    depends_on: [validate]
    settings:
      repo: mcp-playwright-persistent
      dockerfile: mcp-playwright-persistent/deploy/Dockerfile
      context: mcp-playwright-persistent
      tags: ci-${CI_COMMIT_SHA}
      dry_run: true
      pull_image: false
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "lib/**"
          - "mcp-playwright-persistent/**"

  build-nano-banana:
    image: woodpeckerci/plugin-docker-buildx
    depends_on: [validate]
    settings:
      repo: mcp-nano-banana
      dockerfile: mcp-nano-banana/deploy/Dockerfile
      context: mcp-nano-banana
      tags: ci-${CI_COMMIT_SHA}
      dry_run: true
      pull_image: false
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "lib/**"
          - "mcp-nano-banana/**"

  build-woodpecker-ci:
    image: woodpeckerci/plugin-docker-buildx
    depends_on: [validate]
    settings:
      repo: mcp-woodpecker-ci
      dockerfile: mcp-woodpecker-ci/deploy/Dockerfile
      context: mcp-woodpecker-ci
      tags: ci-${CI_COMMIT_SHA}
      dry_run: true
      pull_image: false
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "aws-secrets-agent/**"
          - "lib/**"
          - "mcp-woodpecker-ci/**"

  image-security:
    image: docker:29.5.2-cli
    depends_on: [dockerfile-lint, compose-policy]
    commands:
      - |
        set -eu

        export CPP_IMAGE_TAG="ci-${CI_COMMIT_SHA:-local}"
        docker compose --profile core --profile browser --profile cicd build

        mkdir -p artifacts/sbom
        docker pull ghcr.io/aquasecurity/trivy:0.67.2
        docker pull ghcr.io/anchore/syft:v1.44.0

        images="
        aws-secrets-agent:${CPP_IMAGE_TAG}
        mcp-second-opinion:${CPP_IMAGE_TAG}
        mcp-playwright-persistent:${CPP_IMAGE_TAG}
        mcp-nano-banana:${CPP_IMAGE_TAG}
        mcp-woodpecker-ci:${CPP_IMAGE_TAG}
        "

        for image in $images; do
          slug="${image%%:*}"
          echo "Scanning $image for fixed HIGH/CRITICAL CVEs"
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.67.2 image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "$image"

          echo "Generating SBOMs for $image"
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/anchore/syft:v1.44.0 "$image" -o spdx-json > "artifacts/sbom/${slug}.spdx.json"
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/anchore/syft:v1.44.0 "$image" -o cyclonedx-json > "artifacts/sbom/${slug}.cyclonedx.json"
        done

        for sbom in artifacts/sbom/*.json; do
          test -s "$sbom"
        done
        ls -lh artifacts/sbom
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "aws-secrets-agent/**"
          - "lib/**"
          - "mcp-second-opinion/**"
          - "mcp-playwright-persistent/**"
          - "mcp-nano-banana/**"
          - "mcp-woodpecker-ci/**"

  runtime-smoke:
    image: docker:29.5.2-cli
    depends_on: [image-security]
    commands:
      - apk add --no-cache curl docker-compose
      - |
        set -eu

        PROJECT="cpp-smoke-${CI_PIPELINE_NUMBER:-local}"

        # Keep smoke runs independent from real developer stacks and real AWS secrets.
        # The prefix gives every container a project-unique name so a smoke run never
        # collides with a real stack (which uses the empty-prefix default names).
        export CPP_CONTAINER_PREFIX="cpp-smoke-${CI_PIPELINE_NUMBER:-local}-"
        export AWS_ACCESS_KEY_ID=cpp-smoke-access-key
        export AWS_SECRET_ACCESS_KEY=cpp-smoke-secret-key
        export AWS_SESSION_TOKEN=cpp-smoke-session-token
        export AWS_TOKEN=cpp-smoke-token
        export AWS_SECRETS_AGENT_PORT_MAPPING=2773
        export MCP_SECOND_OPINION_PORT_MAPPING=8080
        export MCP_PLAYWRIGHT_PORT_MAPPING=8081
        export MCP_NANO_BANANA_PORT_MAPPING=8084
        export MCP_WOODPECKER_CI_PORT_MAPPING=8085
        export SECOND_OPINION_AWS_SECRET_NAME=
        export WOODPECKER_CI_AWS_SECRET_NAME=

        cleanup() {
          docker compose -p "$PROJECT" --profile core --profile browser --profile cicd down -v || true
        }
        trap cleanup EXIT INT TERM

        if ! docker compose -p "$PROJECT" --profile core --profile browser --profile cicd up --build --wait; then
          docker compose -p "$PROJECT" --profile core --profile browser --profile cicd ps || true
          docker compose -p "$PROJECT" logs aws-secrets-agent || true
          exit 1
        fi
        docker compose -p "$PROJECT" --profile core --profile browser --profile cicd ps

        check_http() {
          service="$1"
          container_port="$2"
          check_path="$3"
          header=""
          if [ "$#" -ge 4 ]; then
            header="$4"
          fi

          published="$(docker compose -p "$PROJECT" port "$service" "$container_port" | awk -F: 'END {print $NF}')"
          if [ -z "$published" ]; then
            echo "ERROR: no published port for $service:$container_port"
            exit 1
          fi

          # Woodpecker runs this step inside a Docker job container, so host
          # published ports are not reachable via 127.0.0.1 from here. Assert
          # the service HTTP endpoint from inside the service container, then
          # report the published host port to confirm the CI-only random port
          # mapping exists and cannot collide with a workstation stack.
          url="http://127.0.0.1:$container_port$check_path"
          if [ "$service" = "aws-secrets-agent" ]; then
            docker compose -p "$PROJECT" exec -T "$service" \
              curl -sf -H "$header" --max-time 10 "$url" >/dev/null
          else
            docker compose -p "$PROJECT" exec -T "$service" \
              python -c "import urllib.request; urllib.request.urlopen('$url', timeout=10)" >/dev/null
          fi
          echo "OK: $service:$container_port$check_path via host port $published"
        }

        check_http aws-secrets-agent 2773 /ping "X-Aws-Parameters-Secrets-Token: $AWS_TOKEN"
        check_http mcp-second-opinion 8080 /
        check_http mcp-playwright-persistent 8081 /
        check_http mcp-nano-banana 8084 /
        check_http mcp-woodpecker-ci 8085 /
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    when:
      - event: [push, pull_request]
        path:
          - ".woodpecker.yml"
          - "docker-compose.yml"
          - "aws-secrets-agent/**"
          - "lib/**"
          - "mcp-second-opinion/**"
          - "mcp-playwright-persistent/**"
          - "mcp-nano-banana/**"
          - "mcp-woodpecker-ci/**"
