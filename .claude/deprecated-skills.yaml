# Deprecated skill families retired from Claude Power Pack.
#
# Scaffolding in CPP is GitHub Issues only, driven by the flow-auto skillset.
# Wiki.js and Plane were never part of the supported workflow. The wiki-* skills
# below were produced by an older, manifest-driven generation architecture
# (source: manifests/wiki/*.yaml) that no longer exists in this repo, so they
# linger as unmanaged orphans in ~/.claude/skills/ on machines that installed
# an earlier CPP.
#
# This file is the deprecation list of record. The /cpp:update skill-orphan
# prune (issue #395) consumes it to offer guarded removal of matching generated
# skills. Adding a family here does NOT auto-delete anything: removal is always
# user-confirmed.
#
# Schema: version + a list of deprecated families. Each family lists the exact
# generated skill directory names so the prune can match them under
# ~/.claude/skills/ without a fragile repo diff.
#
# Per-family fields:
#   family         (required) - the metadata.family value carried by the
#                               generated SKILL.md frontmatter.
#   reason         (required) - why the family was retired.
#   replacement    (optional) - the supported successor, if any.
#   skills         (required) - exact generated-skill directory names to remove.
#                               These are classified DEPRECATED.
#   entire_family  (optional, default false) - set true ONLY when the WHOLE
#                               family is retired. When true, any installed
#                               generated skill whose metadata.family matches but
#                               is not in `skills` above is classified ORPHANED
#                               (a stray member of a fully-retired family).
#                               When false/absent, unlisted family members are
#                               left OK - this prevents flagging live skills when
#                               only part of a family is deprecated.

version: 1

deprecated:
  - family: wiki
    entire_family: true
    reason: >-
      Wiki.js scaffolding and integration is out of scope for CPP. GitHub Issues
      (via the flow-auto skillset) is the only supported scaffolding backend.
    replacement: GitHub Issues via /flow:auto
    skills:
      - wiki-search
      - wiki-create-page
      - wiki-update-page
    # One-time manual cleanup until the #395 prune lands. Safe: these are
    # generated artifacts, not user content.
    cleanup: |
      rm -rf ~/.claude/skills/wiki-search \
             ~/.claude/skills/wiki-create-page \
             ~/.claude/skills/wiki-update-page

  - family: spec
    entire_family: true
    reason: >-
      CPP's home-grown spec pipeline (/spec:init, /spec:create, /spec:sync,
      /spec:status backed by lib/spec_bridge) is retired in favor of the official
      GitHub spec-kit via /spec:adopt (epic #417 Phase A, decision on #418). The
      generated spec-* skills came from the defunct manifests/spec/*.yaml
      architecture; spec-status and spec-sync still target the retired Plane/Wiki.js
      backend, so they are stale orphans on machines that installed an earlier CPP.
    replacement: /spec:adopt (official spec-kit) + /flow:auto
    skills:
      - spec-create
      - spec-init
      - spec-status
      - spec-sync
    # Manual fallback; the #395 skill-orphan prune in /cpp:update consumes this
    # file and offers guarded, user-confirmed removal. Safe: generated artifacts,
    # not user content.
    cleanup: |
      rm -rf ~/.claude/skills/spec-create \
             ~/.claude/skills/spec-init \
             ~/.claude/skills/spec-status \
             ~/.claude/skills/spec-sync

# Plane has no entry: it was never integrated as a CPP skill or command, so
# there is nothing installed to remove. It is recorded here only to make the
# "GitHub Issues is the sole scaffolding backend" decision explicit.
