version: "1"

# Admin-only prerequisites checked by scripts/bootstrap-check.sh.
#
# The Docker MCP runtime (aws-secrets-agent sidecar + mcp-second-opinion
# container, plus the docker-socket / docker-compose / AWS-credentials
# prerequisites they needed) was retired in issue #469. CPP no longer builds or
# runs containers, so the only remaining hard prerequisite is jq.

dependencies:
  jq:
    description: "JSON processor - required by flow commands (merge, finish, auto, status) and project commands"
    check_command: "command -v jq > /dev/null 2>&1"
    remediation: |
      Install jq:
        Ubuntu/Debian: sudo apt-get install -y jq
        macOS:         brew install jq
        Alpine:        apk add --no-cache jq
        Arch:          sudo pacman -S jq
