# Retired GENERATED file surfaces that Claude Power Pack no longer emits.
#
# This file is the retirement list of record for host-installed *file
# surfaces*: directories in the user's HOME that CPP once generated into and
# has since stopped generating at all. scripts/retired-surface-prune.py
# consumes it to detect ORPHANED GENERATED files left behind on a machine, and
# to offer a guided, user-confirmed, REVERSIBLE teardown via /cpp:update
# (Step 7.9). See the sibling .claude/deprecated-mcps.yaml, which applies the
# same convention to Docker MCP servers.
#
# The problem it exists to solve (issue #575): when a generated surface is
# retired, the generator is deleted from the repo - but every copy it already
# wrote into a user's HOME stays exactly where it was. Codex on the primary box
# was still loading 65 prompts from a surface retired months earlier (#446,
# cut over at #556), and 49 generated skills frozen at 2026-07-04 were still
# loading in Claude sessions alongside the current surface (#480/#481). Nothing
# warns about either; the files simply go stale in place.
#
# SAFETY - two conditions must BOTH hold before any file is classified ORPHANED
# GENERATED (and therefore offered for teardown):
#
#   1. its directory is listed here, AND
#   2. the file itself carries one of this entry's `markers` as a GENERATED
#      header (detection is by MARKER, never by name list - the #575 rule).
#
# Condition 2 is what makes this safe to point at a shared directory. A
# hand-authored file in a listed directory has no marker and is preserved:
# ~/.codex/prompts/cpp-memory.md is hand-curated and installed by
# scripts/install-memory-harness.sh, and it must survive a prune of that
# directory. Likewise a skill the user wrote themselves, or installed with
# `npx skills add`, carries no CPP marker and is never touched.
#
# So an entry can be seeded here ahead of the removal PR with zero risk: until
# files bearing the marker actually exist on a host, the surface reports CLEAN.
# Adding an entry does NOT delete anything on its own - teardown is per-surface
# and user-confirmed, and it MOVES files to a timestamped sibling directory
# rather than deleting them, so a mistake is always recoverable.
#
# Per-entry fields:
#   name        (required) - short identifier used on the CLI and in reports.
#   path        (required) - directory to inspect, ~ expanded. Never recursed
#                            into for `depth: flat`; one level down for
#                            `depth: dirs`.
#   depth       (required) - `flat` = the surface is loose files in `path`;
#                            `dirs` = the surface is one directory per unit and
#                            `entry_file` inside it carries the marker.
#   entry_file  (required for depth: dirs) - the file within each unit dir that
#                            carries the marker (e.g. SKILL.md).
#   markers     (required) - list of GENERATED header substrings. A file is
#                            owned by CPP when its first non-blank content line
#                            (after any YAML frontmatter) starts with one of
#                            these.
#   reason      (required) - why the surface was retired (keep it colon-free).
#   replacement (optional) - the supported successor surface, if any.
#   preserve    (optional) - basenames that are never touched even if they
#                            somehow carry a marker (belt and braces for known
#                            hand-authored files).

version: 1

retired:
  - name: codex-prompts
    path: ~/.codex/prompts
    depth: flat
    # Verified against the deleted generator itself: the marker below is the
    # literal MARKER value from scripts/codex-prompt-sync.py at the commit
    # before its removal. A guessed marker would fail SAFE (nothing matches,
    # nothing pruned) but would also be useless, so it is pinned from history.
    markers:
      - "<!-- GENERATED by claude-power-pack - scripts/codex-prompt-sync.py"
    reason: >-
      flat codex/prompts/ surface retired at the #556 cutover (superseded by
      per-command codex/skills/, #555); its generator scripts/codex-prompt-sync.py
      was deleted, so installed copies became unmaintained and point at a script
      that no longer exists
    replacement: ~/.codex/skills (scripts/codex-skill-sync.py --install)
    preserve:
      - cpp-memory.md

  - name: claude-skills-mirror
    path: ~/.claude/skills
    depth: dirs
    entry_file: SKILL.md
    # The first marker is pinned from scripts/flow-skill-sync.py as it stood
    # before deletion. The second is deliberately GENERIC: CPP retired this
    # directory outright, and no current generator writes here (codex-skill-sync
    # installs to ~/.codex/skills), so any file bearing a CPP marker in this
    # path is an orphan whatever generator produced it. Files with no CPP marker
    # - the user's own skills, `npx skills add` installs - stay untouched.
    markers:
      - "<!-- GENERATED by claude-power-pack - scripts/flow-skill-sync.py"
      - "<!-- GENERATED by claude-power-pack"
    reason: >-
      global-skill mirror retired in Phase B4 (#480) when the plugin surface
      proved parity; its generator flow-skill-sync.py and the skill-drift guard
      were deleted, and B5 (#481) explicitly noted the live host mirror was NOT
      torn down, leaving generated skills loading alongside the current surface
    replacement: /plugin install <family>@cpp
