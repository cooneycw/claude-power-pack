# Woodpecker CI - Server Only (runs on dedicated VM)
# Agents connect from local VMs via gRPC port 9001
# Secrets pulled from AWS Secrets Manager via bootstrap-secrets.py -> docker.env

services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3.13.0@sha256:428eb0965754e25e67b8b086648438858b4fa64487b1cd3cc8e4101b396e459a
    container_name: woodpecker-server
    ports:
      - "9000:8000"
      - "9001:9000"
    volumes:
      - woodpecker-server-data:/var/lib/woodpecker/
    env_file: docker.env
    environment:
      - WOODPECKER_OPEN=true
      - WOODPECKER_GITHUB=true
      - WOODPECKER_ADMIN=cooneycw
      - WOODPECKER_FORGE_TIMEOUT=15s
      - WOODPECKER_FORGE_RETRY=5
      - WOODPECKER_PLUGINS_PRIVILEGED=woodpeckerci/plugin-docker-buildx,plugins/docker
    restart: unless-stopped

volumes:
  woodpecker-server-data:
