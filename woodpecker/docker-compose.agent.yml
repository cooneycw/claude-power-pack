# Woodpecker CI - Agent (runs on each local VM)
# Connects to Woodpecker Server via Tailscale IP
# Requires: WOODPECKER_AGENT_SECRET and WOODPECKER_SERVER in agent.env

services:
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3.13.0@sha256:a983b1016217ad94cdab48d732ec97b5b1f72718725d651183d7ec885f7caf35
    container_name: woodpecker-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: agent.env
    environment:
      - WOODPECKER_MAX_WORKFLOWS=2
    restart: unless-stopped
