# Claude Power Pack - CI-only smoke override (issues #350, #377).
#
# Layered on top of docker-compose.yml during runtime smoke to exercise the
# REAL secret-fetch/parse/export path without production AWS credentials:
#
#   docker compose -f docker-compose.yml -f docker-compose.smoke.yml ...
#
# It adds services under the "smoke" profile so normal `docker-up` is
# unaffected. Two complementary paths are covered:
#
#   (A) Client path against a hermetic fake agent (issue #350):
#   fake-secrets-agent  a hermetic stub (scripts/fake-secrets-agent.py) that
#                       returns a canned SecretString, mimicking the AWS agent.
#   fetch-probe         the REAL mcp-second-opinion image running the REAL
#                       fetch-secrets.sh against the fake agent with a NON-EMPTY
#                       AWS_SECRET_NAME, so it takes the production fetch branch
#                       (not the local-dev fallback). It echoes a sentinel that
#                       only exists if fetch -> parse -> export all succeeded.
#
#   (B) REAL agent against a real Secrets Manager fetch (issue #377):
#   localstack          a LocalStack Secrets Manager that serves a genuinely
#                       seeded secret over the AWS API - no production creds.
#   real-secrets-agent  the REAL aws-secrets-agent binary (same image as the
#                       deployed sidecar) pointed at LocalStack via
#                       AWS_ENDPOINT_URL, so it performs a real SDK GetSecretValue.
#   real-fetch-probe    the REAL mcp-second-opinion image / fetch-secrets.sh
#                       fetching THROUGH the real agent (not the fake), proving
#                       the real binary serves a real fetch end-to-end.

services:
  fake-secrets-agent:
    # Built (not bind-mounted) so it works under Woodpecker's docker-in-docker:
    # the smoke step talks to the host daemon over the mounted socket, where a
    # relative host bind-mount path does not exist, but a build context is
    # streamed to the daemon. dockerfile_inline keeps it to one COPY.
    image: cpp-fake-secrets-agent:${CPP_IMAGE_TAG:-dev}
    build:
      context: ./scripts
      dockerfile_inline: |
        FROM python:3.11-slim
        COPY fake-secrets-agent.py /app/fake-secrets-agent.py
    container_name: ${CPP_CONTAINER_PREFIX:-}fake-secrets-agent
    command: ["python", "/app/fake-secrets-agent.py"]
    environment:
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
      - FAKE_SECRET_ID=cpp/smoke/fake
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import os,urllib.request; r=urllib.request.Request('http://127.0.0.1:2773/ping', headers={'X-Aws-Parameters-Secrets-Token': os.environ.get('AWS_TOKEN','default-token')}); urllib.request.urlopen(r, timeout=5)"
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5
    profiles: ["smoke"]

  fetch-probe:
    # Same tag the stack builds (issue #348 dropped :latest for deployables);
    # runtime-smoke.sh leaves CPP_IMAGE_TAG unset, so this resolves to :dev,
    # matching the image `docker compose up --build` produces.
    image: mcp-second-opinion:${CPP_IMAGE_TAG:-dev}
    container_name: ${CPP_CONTAINER_PREFIX:-}fetch-probe
    # Run the real fetch-secrets.sh entrypoint, then echo the sentinel the fake
    # agent supplies. $$ escapes compose interpolation so the variable is
    # expanded inside the container, AFTER fetch-secrets.sh exports it.
    entrypoint: ["/app/fetch-secrets.sh"]
    command: ["sh", "-c", "echo FETCHED:$$CPP_SMOKE_SENTINEL"]
    environment:
      # Non-empty secret name => production fetch branch, not local-dev fallback.
      - AWS_SECRET_NAME=cpp/smoke/fake
      - SECRETS_AGENT_URL=http://fake-secrets-agent:2773
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
    depends_on:
      fake-secrets-agent:
        condition: service_healthy
    profiles: ["smoke"]

  # --- (B) REAL agent against a real Secrets Manager fetch (issue #377) -------
  localstack:
    # Pinned by digest like every other CI image (reproducible-builds directive).
    # SERVICES=secretsmanager keeps the LocalStack surface (and boot time) minimal;
    # EAGER_SERVICE_LOADING makes secretsmanager ready before the first request so
    # the healthcheck flips green promptly. Internal-only - never host-published.
    image: localstack/localstack:3.8@sha256:b279c01f4cfb8f985a482e4014cabc1e2697b9d7a6c8c8db2e40f4d9f93687c7
    container_name: ${CPP_CONTAINER_PREFIX:-}localstack
    environment:
      - SERVICES=secretsmanager
      - EAGER_SERVICE_LOADING=1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 30
    profiles: ["smoke"]

  real-secrets-agent:
    # The SAME image as the deployed sidecar (built by the stage-1 `up --build`),
    # so this exercises the real binary - not a stub. Pointed at LocalStack via
    # AWS_ENDPOINT_URL so its AWS SDK GetSecretValue resolves a genuinely-seeded
    # secret. validate_credentials=false in config.toml means it boots on /ping
    # liveness; the real fetch happens on demand when real-fetch-probe asks.
    image: aws-secrets-agent:${CPP_IMAGE_TAG:-dev}
    build:
      context: ./aws-secrets-agent
    container_name: ${CPP_CONTAINER_PREFIX:-}real-secrets-agent
    # Internal-only, like the deployed sidecar: never host-published.
    expose:
      - "2773"
    security_opt:
      - no-new-privileges:true
    environment:
      # LocalStack accepts any non-empty creds; the entrypoint guard requires
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY to be present (defaulted here
      # for standalone use, inherited from the smoke env in CI).
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-cpp-smoke-access-key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-cpp-smoke-secret-key}
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
      # Redirect the AWS SDK at LocalStack. The generic var suffices (verified
      # against Agent/2.1.0); the service-specific var is set too for safety.
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ENDPOINT_URL_SECRETS_MANAGER=http://localstack:4566
    healthcheck:
      test: ["CMD", "curl", "-sf", "-H", "X-Aws-Parameters-Secrets-Token: ${AWS_TOKEN:-default-token}", "http://localhost:2773/ping"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10
    depends_on:
      localstack:
        condition: service_healthy
    profiles: ["smoke"]

  real-fetch-probe:
    image: mcp-second-opinion:${CPP_IMAGE_TAG:-dev}
    container_name: ${CPP_CONTAINER_PREFIX:-}real-fetch-probe
    # Real fetch-secrets.sh entrypoint, fetching THROUGH the real agent. The
    # sentinel is the value seeded into LocalStack; it only survives if the real
    # agent really fetched it and fetch-secrets.sh parsed + exported it.
    entrypoint: ["/app/fetch-secrets.sh"]
    command: ["sh", "-c", "echo FETCHED:$$CPP_SMOKE_SENTINEL"]
    environment:
      - AWS_SECRET_NAME=cpp/smoke/real
      - SECRETS_AGENT_URL=http://real-secrets-agent:2773
      - AWS_TOKEN=${AWS_TOKEN:-default-token}
    depends_on:
      real-secrets-agent:
        condition: service_healthy
    profiles: ["smoke"]
